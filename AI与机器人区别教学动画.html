    &lt;title&gt;AI 是聰明的大腦！&lt;/title&gt;
    &lt;!-- Tailwind CSS --&gt;
    &lt;script src=&quot;https://metis-online.fbcontent.cn/metis-misc/zgLDUdmazTYc0B4K6Cor.js&quot;&gt;&lt;/script&gt;
    &lt;!-- Anime.js --&gt;
    &lt;script src=&quot;https://metis-online.fbcontent.cn/metis-misc/zZZY40t7WJC7UdQCPACm.js&quot;&gt;&lt;/script&gt;
    &lt;style&gt;
        :root {
            --primary: #6366F1;
            --secondary: #10B981;
            --accent: #F59E0B;
            --bg: #F8FAFC;
        }
        body {
            background-color: var(--bg);
            font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif;
            overflow-x: hidden;
            color: #1E293B;
            touch-action: manipulation; /* 优化移动端点击延迟 */
        }
        .step-card {
            display: none;
            min-height: 50vh;
        }
        .step-card.active {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .brain-container {
            position: relative;
            width: clamp(140px, 35vw, 220px);
            height: clamp(140px, 35vw, 220px);
            cursor: pointer;
        }
        .brain-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 15px rgba(99, 102, 241, 0.5));
        }
        .item-img {
            width: clamp(70px, 12vw, 120px);
            height: clamp(70px, 12vw, 120px);
            object-fit: contain;
        }
        .bubble {
            position: absolute;
            background: white;
            border-radius: 50%;
            padding: clamp(6px, 1.5vw, 12px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            opacity: 0;
            font-size: clamp(1.2rem, 3vw, 2.5rem);
            z-index: 10;
        }
        .draggable {
            cursor: grab;
            transition: transform 0.2s;
            user-select: none;
            touch-action: none; /* 关键：禁用浏览器默认触摸行为 */
        }
        .draggable:active {
            cursor: grabbing;
            transform: scale(1.1);
        }
        .drop-zone {
            border: 3px dashed #CBD5E1;
            border-radius: 50%;
            width: clamp(70px, 18vw, 110px);
            height: clamp(70px, 18vw, 110px);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        .drop-zone.highlight {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
            transform: scale(1.05);
        }
        .robot-part-slot {
            width: clamp(45px, 12vw, 70px);
            height: clamp(45px, 12vw, 70px);
            border: 2px dashed #94A3B8;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(1.2rem, 3vw, 2.5rem);
            transition: all 0.3s;
        }
        .nav-btn {
            transition: all 0.3s;
            -webkit-tap-highlight-color: transparent; /* 移除移动端点击高亮 */
        }
        .nav-btn:active:not(:disabled) {
            transform: scale(0.95);
        }
        .nav-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        /* 动画效果 */
        .pulse {
            animation: pulse 3s infinite ease-in-out;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }
        .shake {
            animation: shake 0.6s infinite;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-3px); }
            75% { transform: translateX(3px); }
        }
        .confetti {
            position: fixed;
            width: 8px;
            height: 8px;
            pointer-events: none;
            z-index: 999;
        }
        /* 移动端适配 */
        @media (max-width: 640px) {
            .step-card { min-height: 45vh; }
            main { padding: 1.5rem !important; border-radius: 1.5rem !important; }
            h1 { font-size: 1.1rem; }
            h2 { font-size: 1rem; margin-bottom: 1.5rem !important; }
            .nav-btn { padding-left: 1.5rem !important; padding-right: 1.5rem !important; font-size: 0.9rem !important; }
        }
    &lt;/style&gt;

    &lt;script&gt;
        let currentStep = 1;
        const totalSteps = 5;

        function updateStep() {
            document.querySelectorAll('.step-card').forEach(card =&gt; card.classList.remove('active'));
            document.getElementById(`step${currentStep}`).classList.add('active');
            document.getElementById('step-indicator').innerText = `${currentStep} / ${totalSteps}`;
            
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            
            prevBtn.style.visibility = currentStep === 1 ? 'hidden' : 'visible';
            nextBtn.innerText = currentStep === totalSteps ? '重新開始' : '下一步';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        document.getElementById('nextBtn').addEventListener('click', () =&gt; {
            if (currentStep &lt; totalSteps) { currentStep++; updateStep(); }
            else { location.reload(); }
        });

        document.getElementById('prevBtn').addEventListener('click', () =&gt; {
            if (currentStep &gt; 1) { currentStep--; updateStep(); }
        });

        document.getElementById('main-brain').addEventListener('click', function() {
            anime({ targets: this, scale: [1, 1.15, 1], duration: 600, easing: 'easeOutElastic(1, .8)' });
            anime({ targets: '.bubble', opacity: [0, 1], translateY: [-20, 0], delay: anime.stagger(150), duration: 600 });
            document.getElementById('audio-smart').play();
        });

        // 移动端兼容的拖拽逻辑
        function setupDraggable(dragId, targetId, successCallback) {
            const dragEl = document.getElementById(dragId);
            const targetEl = document.getElementById(targetId);
            let startX, startY, initialX = 0, initialY = 0;

            // 触摸开始
            dragEl.addEventListener('touchstart', (e) =&gt; {
                const touch = e.touches[0];
                startX = touch.clientX;
                startY = touch.clientY;
                dragEl.style.zIndex = '1000';
                dragEl.style.transition = 'none';
            }, {passive: false});

            // 触摸移动
            dragEl.addEventListener('touchmove', (e) =&gt; {
                e.preventDefault(); // 阻止页面滚动
                const touch = e.touches[0];
                const dx = touch.clientX - startX;
                const dy = touch.clientY - startY;
                dragEl.style.transform = `translate(${dx}px, ${dy}px) scale(1.1)`;
            }, {passive: false});

            // 触摸结束
            dragEl.addEventListener('touchend', (e) =&gt; {
                const touch = e.changedTouches[0];
                const targetRect = targetEl.getBoundingClientRect();
                
                dragEl.style.zIndex = '';
                dragEl.style.transition = 'transform 0.2s';
                
                if (touch.clientX &gt;= targetRect.left &amp;&amp; touch.clientX &lt;= targetRect.right &amp;&amp;
                    touch.clientY &gt;= targetRect.top &amp;&amp; touch.clientY &lt;= targetRect.bottom) {
                    successCallback(dragEl, targetEl);
                    dragEl.style.transform = 'scale(0)';
                    setTimeout(() =&gt; dragEl.style.display = 'none', 200);
                } else {
                    dragEl.style.transform = 'translate(0, 0)';
                }
            }, {passive: false});

            // PC 鼠标支持
            dragEl.addEventListener('mousedown', (e) =&gt; {
                startX = e.clientX;
                startY = e.clientY;
                const onMouseMove = (me) =&gt; {
                    const dx = me.clientX - startX;
                    const dy = me.clientY - startY;
                    dragEl.style.transform = `translate(${dx}px, ${dy}px) scale(1.1)`;
                };
                const onMouseUp = (ue) =&gt; {
                    const targetRect = targetEl.getBoundingClientRect();
                    if (ue.clientX &gt;= targetRect.left &amp;&amp; ue.clientX &lt;= targetRect.right &amp;&amp;
                        ue.clientY &gt;= targetRect.top &amp;&amp; ue.clientY &lt;= targetRect.bottom) {
                        successCallback(dragEl, targetEl);
                        dragEl.style.display = 'none';
                    } else {
                        dragEl.style.transform = 'translate(0, 0)';
                    }
                    document.removeEventListener('mousemove', onMouseMove);
                    document.removeEventListener('mouseup', onMouseUp);
                };
                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
            });
        }

        // Step 2
        let sensors = 0;
        setupDraggable('drag-eye', 'eye-slot', (d, t) =&gt; { t.innerHTML = '📸'; t.style.opacity = '1'; checkSensors(); });
        setupDraggable('drag-ear', 'ear-slot', (d, t) =&gt; { t.innerHTML = '🎤'; t.style.opacity = '1'; checkSensors(); });
        function checkSensors() { if (++sensors === 2) { confettiEffect(); document.getElementById('audio-smart').play(); } }

        // Step 3
        document.getElementById('try-reach').addEventListener('click', function() {
            anime({ targets: '#trapped-brain', translateX: [0, 20, -20, 20, 0], duration: 600 });
            setTimeout(() =&gt; {
                const x = document.getElementById('big-x');
                x.style.opacity = '1';
                anime({ targets: x, scale: [0.5, 1], duration: 400 });
                document.getElementById('audio-oops').play();
            }, 600);
        });

        // Step 4
        let parts = 0;
        ['arm-l', 'arm-r', 'leg-l', 'leg-r'].forEach(id =&gt; {
            setupDraggable(`part-${id}`, id, (d, t) =&gt; {
                t.innerHTML = d.innerHTML; t.style.background = '#10B981';
                if (++parts === 4) {
                    setTimeout(() =&gt; {
                        document.getElementById('robot-body').innerHTML = '&lt;span class=&quot;text-7xl&quot;&gt;🤖&lt;/span&gt;';
                        document.getElementById('audio-tada').play();
                        confettiEffect();
                    }, 400);
                }
            });
        });

        // Step 5
        setupDraggable('drag-shoes', 'shoe-slot', (d, t) =&gt; {
            t.innerHTML = '👟'; document.getElementById('robot-target').style.background = '#F0FDF4';
            document.getElementById('audio-tada').play(); confettiEffect();
        });

        function confettiEffect() {
            for(let i=0; i&lt;30; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.style.backgroundColor = ['#6366F1', '#10B981', '#F59E0B'][Math.floor(Math.random()*3)];
                c.style.left = '50%'; c.style.top = '50%';
                document.body.appendChild(c);
                anime({
                    targets: c, translateX: (Math.random()-0.5)*600, translateY: (Math.random()-0.5)*600,
                    opacity: [1, 0], scale: [1, 0], duration: 1500, easing: 'easeOutExpo', complete: () =&gt; c.remove()
                });
            }
        }
        updateStep();
    &lt;/script&gt;

  <script>

    function getIsMobile() {
      const width = document.documentElement.clientWidth
      const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|iPad|Windows Phone|Mobile/i.test(navigator.userAgent) || width <= 768
      return isMobile
    }

    // 打开飞象老师官网
    function openFeixiangTeacher(event) {
      const isMobile = getIsMobile()

      // 判断是否为移动端浏览器
      if (isMobile) {
        // 移动端不跳转
        return
      }
      window.open('https://www.feixianglaoshi.com', '_blank')
    }


    // ==================== 埋点相关代码 ====================

    /**
     * 页面停留时长统计
     */
    (function () {
      let startTime = null
      let totalTime = 0
      let reportTimer = null // 防抖定时器

      // 开始计时
      function startTimer() {
        if (!startTime) {
          startTime = Date.now()
          console.log('[埋点] 开始计时')
        }
      }

      // 停止计时并累加时长
      function stopTimer() {
        if (startTime) {
          totalTime += Date.now() - startTime
          startTime = null
          console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
        }
      }

      // 检查页面是否真正可见
      function isPageVisible() {
        // 检查 document.hidden
        if (document.hidden) {
          return false
        }

        // 检查 document.visibilityState
        if (document.visibilityState && document.visibilityState !== 'visible') {
          return false
        }

        // 检查窗口是否有焦点
        if (!document.hasFocus()) {
          return false
        }

        return true
      }

      // 上报停留时长（带防抖）
      function reportStayTime(eventType, immediate = false) {
        stopTimer()

        // 清除之前的定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 如果是立即上报（如页面卸载），不使用防抖
        if (immediate) {
          doReport(eventType)
          return
        }

        // 使用防抖，避免短时间内多次上报
        // 100ms 内如果有多个事件触发，只上报最后一次
        reportTimer = setTimeout(function () {
          doReport(eventType)
          reportTimer = null
        }, 100)
      }

      // 实际执行上报
      function doReport(eventType) {
        if (window.frog && totalTime > 0) {
          const serverData = window.__SERVER_DATA__ || {}
          const chatId = serverData.watermarkChatId
          window.frog.add({
            url: '/time/HtmlPage/enter',
            eventId: 42818,
            customExtend: {
              chat_id: chatId,
              use_time: Math.floor(totalTime / 1000), // 转换为秒
            },
            duration: Math.floor(totalTime / 1000), // 转换为秒,
            currentPage: 'HtmlPage',
            eventAction: 'time',
            eventName: 'enter'
          })
          console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

          // 上报后重置累计时长，为下次统计做准备
          totalTime = 0
        }
      }

      // 清理函数：移除所有事件监听器
      function cleanup() {
        console.log('[埋点] 清理计时器资源')

        // 清除防抖定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 移除事件监听器
        document.removeEventListener('visibilitychange', handleVisibilityChange)
        window.removeEventListener('blur', handleBlur)
        window.removeEventListener('focus', handleFocus)
        window.removeEventListener('beforeunload', handleBeforeUnload)
        window.removeEventListener('pagehide', handlePageHide)

        // 重置变量
        startTime = null
        totalTime = 0
      }

      // 事件处理函数（需要命名以便移除）
      function handleVisibilityChange() {
        if (document.hidden) {
          // 页面不可见，停止计时并上报
          console.log('[埋点] visibilitychange - 页面隐藏')
          reportStayTime('visibilitychange')
        } else {
          // 页面可见，开始新的计时
          console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
          startTimer()
        }
      }

      function handleBlur() {
        // 窗口失去焦点，停止计时并上报
        console.log('[埋点] blur - 窗口失去焦点')
        reportStayTime('blur')
      }

      function handleFocus() {
        // 窗口获得焦点，开始新的计时
        console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
        startTimer()
      }

      function handleBeforeUnload() {
        // 页面卸载前立即上报（不使用防抖）
        console.log('[埋点] beforeunload - 页面即将卸载')
        reportStayTime('beforeunload', true)
        cleanup()
      }

      function handlePageHide() {
        // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
        console.log('[埋点] pagehide - 页面隐藏')
        reportStayTime('pagehide', true)
      }

      function handleDOMContentLoaded() {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 监听页面可见性变化
      document.addEventListener('visibilitychange', handleVisibilityChange)

      // 监听窗口失去/获得焦点
      window.addEventListener('blur', handleBlur)
      window.addEventListener('focus', handleFocus)

      // 页面加载完成后开始计时
      if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
      } else {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 页面卸载时上报
      window.addEventListener('beforeunload', handleBeforeUnload)

      // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
      window.addEventListener('pagehide', handlePageHide)
    })()

    /**
     * 点击飞象老师 Logo 的埋点
     */
    function trackLogoClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)

        window.frog.add({
          url: '/click/HtmlPage/logo',
          eventId: 42816,
          customExtend: {
            chat_id: chatId,
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'logo'
        })

        console.log('[埋点] 点击飞象老师 Logo')
      }
    }

    /**
     * 点击立即体验的埋点
     */
    function trackStartButtonClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)
        window.frog.add({
          url: '/click/HtmlPage/start',
          eventId: 42817,
          customExtend: {
            chat_id: chatId
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'start'
        })
        console.log('[埋点] 点击立即体验')
      }
    }

    // 绑定点击事件
    document.addEventListener('DOMContentLoaded', function () {
      // 绑定 Logo 点击埋点和跳转功能
      const logoElement = document.querySelector('.left-watermark-content')
      if (logoElement) {
        logoElement.addEventListener('click', function (event) {
          trackLogoClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定立即体验按钮点击埋点和跳转功能
      const startButton = document.querySelector('.jump-button')
      if (startButton) {
        startButton.addEventListener('click', function (event) {
          trackStartButtonClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定水印覆盖层点击（整体区域）
      const watermarkOverlay = document.querySelector('.watermark-overlay')
      if (watermarkOverlay) {
        watermarkOverlay.addEventListener('click', function (event) {
          // 如果点击的不是 logo 或按钮，则触发跳转
          const target = event.target
          const isLogo = target.closest('.left-watermark-content')
          const isButton = target.closest('.jump-button')

          if (!isLogo && !isButton) {
            openFeixiangTeacher(event)
          }
        })
      }
    })

    // ==================== 原有功能代码 ====================

    function adjustRem() {
      const pcBaseWidth = 375 // 设计稿
      const width = document.documentElement.clientWidth
      document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
      const isMobile = getIsMobile()
      if (isMobile) {
        adjustRem()
      }
      const jumpButton = document.querySelector('.right-watermark-content .jump-button');
      const iframeContainer = document.querySelector('.iframe-container');

      if (isMobile && jumpButton) {
        jumpButton.style.display = 'none';
      } else {
        jumpButton.style.display = 'flex'
      }

      // 移动端时给iframe-container添加类名，否则移除类名
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }


    function handleResize() {
      // 响应式处理：重新检测移动端并处理按钮显示/隐藏
      checkAndHideButtonOnMobile();

      // 在窗口大小变化时，重新应用移动端相关的逻辑
      const isMobile = getIsMobile()
      const watermarkOverlay = document.querySelector('.watermark-overlay');
      const iframeContainer = document.querySelector('.iframe-container');

      // 根据当前设备类型调整水印覆盖层的点击行为
      if (watermarkOverlay) {
        if (isMobile) {
          // 移动端：移除点击事件或设置为空函数
          watermarkOverlay.onclick = function () {
            // 移动端不执行跳转
            return;
          };
        } else {
          // 桌面端：恢复正常的点击跳转功能
          watermarkOverlay.onclick = openFeixiangTeacher;
        }
      }

      // 确保在resize时也能正确添加或移除mobile类
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
      // 清除 resize 事件监听器
      window.removeEventListener('resize', handleResize);

      // 清除 DOMContentLoaded 事件监听器
      document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);
