&lt;div class=&quot;result-overlay hidden&quot; id=&quot;resultOverlay&quot;&gt;
    &lt;div class=&quot;modal-content&quot;&gt;
        &lt;h1 class=&quot;text-3xl font-bold text-green-600 mb-4&quot;&gt;學習完成！&lt;/h1&gt;
        &lt;p class=&quot;text-gray-600 text-lg mb-6&quot; id=&quot;resultMessage&quot;&gt;
            太棒了！我已經學到了很多知識！&lt;br&gt;
            機器學習就是這樣通過數據變得聰明的！
        &lt;/p&gt;
        &lt;button class=&quot;btn-primary&quot; id=&quot;restartBtn&quot;&gt;再玩一次&lt;/button&gt;
    &lt;/div&gt;
&lt;/div&gt;

&lt;!-- Audio Elements --&gt;
&lt;audio id=&quot;audioYummy&quot; src=&quot;https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/hpCJM6KhXB7h8XvjmdbwEe.mp3&quot;&gt;&lt;/audio&gt;
&lt;audio id=&quot;audioOops&quot; src=&quot;https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/za77asio8fsEraZdAeoAkd.mp3&quot;&gt;&lt;/audio&gt;
&lt;audio id=&quot;audioSuccess&quot; src=&quot;https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/yggjZGsTDzEHqY3GqTZjDB.mp3&quot;&gt;&lt;/audio&gt;

&lt;script&gt;
    const GamePhase = { INTRO: 'intro', PLAYING: 'playing', END: 'end' };
    const gameState = {
        phase: GamePhase.INTRO,
        score: 0,
        targetScore: 10,
        fruits: []
    };

    const fruitTypes = [
        { id: 'apple', img: 'https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/picture/qxKjxuo29q2iiXH79XwtGc.jpg', isTarget: true },
        { id: 'banana', img: 'https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/picture/r6QHik3CdUnLWCpx89bgVR.jpg', isTarget: false },
        { id: 'grape', img: 'https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/picture/G7Q84ftHXkLApS8KkknHS5.jpg', isTarget: false }
    ];

    const gameContainer = document.getElementById('gameContainer');
    const aiSprite = document.getElementById('aiSprite');
    const feedbackBubble = document.getElementById('feedbackBubble');
    const feedbackText = document.getElementById('feedbackText');
    const scoreText = document.getElementById('scoreText');
    const progressBar = document.getElementById('progressBar');
    const introOverlay = document.getElementById('introOverlay');
    const resultOverlay = document.getElementById('resultOverlay');

    function startGame() {
        introOverlay.classList.add('hidden');
        resultOverlay.classList.add('hidden');
        gameState.phase = GamePhase.PLAYING;
        gameState.score = 0;
        updateUI();
        spawnFruits();
    }

    function spawnFruits() {
        if (gameState.phase !== GamePhase.PLAYING) return;
        while (gameState.fruits.length &lt; 6) {
            createFruit();
        }
    }

    function createFruit() {
        const type = fruitTypes[Math.floor(Math.random() * fruitTypes.length)];
        const fruit = document.createElement('div');
        fruit.className = 'fruit';
        fruit.innerHTML = `&lt;img src=&quot;${type.img}&quot; class=&quot;w-full h-full object-contain pointer-events-none&quot;&gt;`;
        
        const x = Math.random() * (window.innerWidth - 100) + 50;
        const y = Math.random() * (window.innerHeight * 0.5) + 50;
        
        fruit.style.left = x + 'px';
        fruit.style.top = y + 'px';
        
        gameContainer.appendChild(fruit);
        gameState.fruits.push({ element: fruit, type: type });
        
        makeDraggable(fruit, type);
        
        anime({
            targets: fruit,
            scale: [0, 1],
            opacity: [0, 1],
            duration: 500,
            easing: 'easeOutBack'
        });
    }

    function makeDraggable(element, type) {
        let isDragging = false;
        let startX, startY, initialX, initialY;

        const onStart = (e) =&gt; {
            if (gameState.phase !== GamePhase.PLAYING) return;
            isDragging = true;
            element.classList.add('dragging');
            const point = e.touches ? e.touches[0] : e;
            startX = point.clientX;
            startY = point.clientY;
            initialX = element.offsetLeft;
            initialY = element.offsetTop;
        };

        const onMove = (e) =&gt; {
            if (!isDragging) return;
            const point = e.touches ? e.touches[0] : e;
            const dx = point.clientX - startX;
            const dy = point.clientY - startY;
            element.style.left = (initialX + dx) + 'px';
            element.style.top = (initialY + dy) + 'px';
        };

        const onEnd = (e) =&gt; {
            if (!isDragging) return;
            isDragging = false;
            element.classList.remove('dragging');
            
            const aiRect = aiSprite.getBoundingClientRect();
            const fruitRect = element.getBoundingClientRect();
            
            const isHit = !(fruitRect.right &lt; aiRect.left || 
                           fruitRect.left &gt; aiRect.right || 
                           fruitRect.bottom &lt; aiRect.top || 
                           fruitRect.top &gt; aiRect.bottom);

            if (isHit) {
                handleFeed(element, type);
            } else {
                anime({
                    targets: element,
                    left: initialX,
                    top: initialY,
                    duration: 500,
                    easing: 'easeOutElastic(1, .8)'
                });
            }
        };

        element.addEventListener('mousedown', onStart);
        element.addEventListener('touchstart', onStart, { passive: false });
        window.addEventListener('mousemove', onMove);
        window.addEventListener('touchmove', onMove, { passive: false });
        window.addEventListener('mouseup', onEnd);
        window.addEventListener('touchend', onEnd);
    }

    function handleFeed(element, type) {
        gameState.fruits = gameState.fruits.filter(f =&gt; f.element !== element);
        
        anime({
            targets: element,
            scale: 0,
            opacity: 0,
            duration: 300,
            easing: 'easeInBack',
            complete: () =&gt; element.remove()
        });

        if (type.isTarget) {
            gameState.score++;
            updateUI();
            showFeedback(&quot;Yummy! 我越來越聰明了！&quot;, &quot;correct&quot;);
            document.getElementById('audioYummy').play().catch(()=&gt;{});
            
            anime({
                targets: aiSprite,
                scale: [1, 1.2, 1],
                duration: 500,
                easing: 'easeOutBack'
            });

            if (gameState.score &gt;= gameState.targetScore) {
                endGame();
            }
        } else {
            showFeedback(&quot;Oops，再想想。&quot;, &quot;wrong&quot;);
            document.getElementById('audioOops').play().catch(()=&gt;{});
            
            anime({
                targets: aiSprite,
                translateX: ['-50%', '-55%', '-45%', '-50%'],
                duration: 400,
                easing: 'easeInOutQuad'
            });
        }
        
        setTimeout(spawnFruits, 500);
    }

    function showFeedback(text, status) {
        feedbackText.innerText = text;
        feedbackText.className = status === &quot;correct&quot; ? &quot;text-lg font-bold text-green-600&quot; : &quot;text-lg font-bold text-red-500&quot;;
        
        anime.remove(feedbackBubble);
        anime({
            targets: feedbackBubble,
            opacity: [0, 1, 1, 0],
            translateY: [20, 0, 0, -20],
            duration: 2000,
            easing: 'easeOutExpo'
        });
    }

    function updateUI() {
        scoreText.innerText = gameState.score;
        const progress = (gameState.score / gameState.targetScore) * 100;
        progressBar.style.width = progress + '%';
    }

    function endGame() {
        gameState.phase = GamePhase.END;
        document.getElementById('audioSuccess').play().catch(()=&gt;{});
        
        // 清理剩餘水果
        gameState.fruits.forEach(f =&gt; f.element.remove());
        gameState.fruits = [];

        setTimeout(() =&gt; {
            resultOverlay.classList.remove('hidden');
            anime({
                targets: resultOverlay.querySelector('.modal-content'),
                scale: [0.8, 1],
                opacity: [0, 1],
                duration: 800,
                easing: 'easeOutBack'
            });
        }, 1000);
    }

    // 事件綁定
    document.getElementById('startBtn').addEventListener('click', startGame);
    document.getElementById('restartBtn').addEventListener('click', () =&gt; {
        location.reload();
    });

    // 初始 AI 呼吸動畫
    anime({
        targets: aiSprite,
        translateY: [0, -10],
        duration: 1500,
        direction: 'alternate',
        loop: true,
        easing: 'easeInOutSine'
    });
&lt;/script&gt;

  <script>

    function getIsMobile() {
      const width = document.documentElement.clientWidth
      const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|iPad|Windows Phone|Mobile/i.test(navigator.userAgent) || width <= 768
      return isMobile
    }

    // 打开飞象老师官网
    function openFeixiangTeacher(event) {
      const isMobile = getIsMobile()

      // 判断是否为移动端浏览器
      if (isMobile) {
        // 移动端不跳转
        return
      }
      window.open('https://www.feixianglaoshi.com', '_blank')
    }


    // ==================== 埋点相关代码 ====================

    /**
     * 页面停留时长统计
     */
    (function () {
      let startTime = null
      let totalTime = 0
      let reportTimer = null // 防抖定时器

      // 开始计时
      function startTimer() {
        if (!startTime) {
          startTime = Date.now()
          console.log('[埋点] 开始计时')
        }
      }

      // 停止计时并累加时长
      function stopTimer() {
        if (startTime) {
          totalTime += Date.now() - startTime
          startTime = null
          console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
        }
      }

      // 检查页面是否真正可见
      function isPageVisible() {
        // 检查 document.hidden
        if (document.hidden) {
          return false
        }

        // 检查 document.visibilityState
        if (document.visibilityState && document.visibilityState !== 'visible') {
          return false
        }

        // 检查窗口是否有焦点
        if (!document.hasFocus()) {
          return false
        }

        return true
      }

      // 上报停留时长（带防抖）
      function reportStayTime(eventType, immediate = false) {
        stopTimer()

        // 清除之前的定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 如果是立即上报（如页面卸载），不使用防抖
        if (immediate) {
          doReport(eventType)
          return
        }

        // 使用防抖，避免短时间内多次上报
        // 100ms 内如果有多个事件触发，只上报最后一次
        reportTimer = setTimeout(function () {
          doReport(eventType)
          reportTimer = null
        }, 100)
      }

      // 实际执行上报
      function doReport(eventType) {
        if (window.frog && totalTime > 0) {
          const serverData = window.__SERVER_DATA__ || {}
          const chatId = serverData.watermarkChatId
          window.frog.add({
            url: '/time/HtmlPage/enter',
            eventId: 42818,
            customExtend: {
              chat_id: chatId,
              use_time: Math.floor(totalTime / 1000), // 转换为秒
            },
            duration: Math.floor(totalTime / 1000), // 转换为秒,
            currentPage: 'HtmlPage',
            eventAction: 'time',
            eventName: 'enter'
          })
          console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

          // 上报后重置累计时长，为下次统计做准备
          totalTime = 0
        }
      }

      // 清理函数：移除所有事件监听器
      function cleanup() {
        console.log('[埋点] 清理计时器资源')

        // 清除防抖定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 移除事件监听器
        document.removeEventListener('visibilitychange', handleVisibilityChange)
        window.removeEventListener('blur', handleBlur)
        window.removeEventListener('focus', handleFocus)
        window.removeEventListener('beforeunload', handleBeforeUnload)
        window.removeEventListener('pagehide', handlePageHide)

        // 重置变量
        startTime = null
        totalTime = 0
      }

      // 事件处理函数（需要命名以便移除）
      function handleVisibilityChange() {
        if (document.hidden) {
          // 页面不可见，停止计时并上报
          console.log('[埋点] visibilitychange - 页面隐藏')
          reportStayTime('visibilitychange')
        } else {
          // 页面可见，开始新的计时
          console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
          startTimer()
        }
      }

      function handleBlur() {
        // 窗口失去焦点，停止计时并上报
        console.log('[埋点] blur - 窗口失去焦点')
        reportStayTime('blur')
      }

      function handleFocus() {
        // 窗口获得焦点，开始新的计时
        console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
        startTimer()
      }

      function handleBeforeUnload() {
        // 页面卸载前立即上报（不使用防抖）
        console.log('[埋点] beforeunload - 页面即将卸载')
        reportStayTime('beforeunload', true)
        cleanup()
      }

      function handlePageHide() {
        // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
        console.log('[埋点] pagehide - 页面隐藏')
        reportStayTime('pagehide', true)
      }

      function handleDOMContentLoaded() {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 监听页面可见性变化
      document.addEventListener('visibilitychange', handleVisibilityChange)

      // 监听窗口失去/获得焦点
      window.addEventListener('blur', handleBlur)
      window.addEventListener('focus', handleFocus)

      // 页面加载完成后开始计时
      if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
      } else {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 页面卸载时上报
      window.addEventListener('beforeunload', handleBeforeUnload)

      // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
      window.addEventListener('pagehide', handlePageHide)
    })()

    //      * 点击 HTML 任何部分的埋点
    //      */
    //     function trackHtmlClick(event) {

    /**
     * 点击飞象老师 Logo 的埋点

      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}

        console.log('trackHtmlClick', chatId)

        window.frog.add({
          url: '/click/HtmlPage/logo',
          eventId: 42816,
          customExtend: {
            chat_id: chatId,
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'logo'
        })

        console.log('[埋点] 点击飞象老师 Logo')
      }
    }

    /**
     * 点击立即体验的埋点
     */
    function trackStartButtonClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)
        window.frog.add({
          url: '/click/HtmlPage/start',
          eventId: 42817,
          customExtend: {
            chat_id: chatId
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'start'
        })
        console.log('[埋点] 点击立即体验')
      }
    }

    // 绑定点击事件
    document.addEventListener('DOMContentLoaded', function () {
      // 绑定 Logo 点击埋点和跳转功能
      const logoElement = document.querySelector('.left-watermark-content')
      if (logoElement) {
        logoElement.addEventListener('click', function (event) {
          trackLogoClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定立即体验按钮点击埋点和跳转功能
      const startButton = document.querySelector('.jump-button')
      if (startButton) {
        startButton.addEventListener('click', function (event) {
          trackStartButtonClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定水印覆盖层点击（整体区域）
      const watermarkOverlay = document.querySelector('.watermark-overlay')
      if (watermarkOverlay) {
        watermarkOverlay.addEventListener('click', function (event) {
          // 如果点击的不是 logo 或按钮，则触发跳转
          const target = event.target
          const isLogo = target.closest('.left-watermark-content')
          const isButton = target.closest('.jump-button')

          if (!isLogo && !isButton) {
            openFeixiangTeacher(event)
          }
        })
      }
    })

    // ==================== 原有功能代码 ====================

    function adjustRem() {
      const pcBaseWidth = 375 // 设计稿
      const width = document.documentElement.clientWidth
      document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
      const isMobile = getIsMobile()
      if (isMobile) {
        adjustRem()
      }
      const jumpButton = document.querySelector('.right-watermark-content .jump-button');
      const iframeContainer = document.querySelector('.iframe-container');

      if (isMobile && jumpButton) {
        jumpButton.style.display = 'none';
      } else {
        jumpButton.style.display = 'flex'
      }

      // 移动端时给iframe-container添加类名，否则移除类名
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }


    function handleResize() {
      // 响应式处理：重新检测移动端并处理按钮显示/隐藏
      checkAndHideButtonOnMobile();

      // 在窗口大小变化时，重新应用移动端相关的逻辑
      const isMobile = getIsMobile()
      const watermarkOverlay = document.querySelector('.watermark-overlay');
      const iframeContainer = document.querySelector('.iframe-container');

      // 根据当前设备类型调整水印覆盖层的点击行为
      if (watermarkOverlay) {
        if (isMobile) {
          // 移动端：移除点击事件或设置为空函数
          watermarkOverlay.onclick = function () {
            // 移动端不执行跳转
            return;
          };
        } else {
          // 桌面端：恢复正常的点击跳转功能
          watermarkOverlay.onclick = openFeixiangTeacher;
        }
      }

      // 确保在resize时也能正确添加或移除mobile类
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
      // 清除 resize 事件监听器
      window.removeEventListener('resize', handleResize);

      // 清除 DOMContentLoaded 事件监听器
      document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);

  </script>
