                        AI现在还不知道什么是苹果。它需要通过观察大量的特征（颜色、形状、果柄）来建立&ldquo;苹果&rdquo;的概念。
                    &lt;/p&gt;
                &lt;/div&gt;
            &lt;/div&gt;
        &lt;/div&gt;

        &lt;!-- 科普说明 --&gt;
        &lt;section class=&quot;mt-12 glass-card rounded-3xl p-8 shadow-lg&quot;&gt;
            &lt;h2 class=&quot;text-2xl font-bold mb-6 text-center&quot;&gt;AI 是如何学习的？&lt;/h2&gt;
            &lt;div class=&quot;grid grid-cols-1 md:grid-cols-3 gap-8&quot;&gt;
                &lt;div class=&quot;text-center&quot;&gt;
                    &lt;div class=&quot;text-4xl mb-4&quot;&gt;🔍&lt;/div&gt;
                    &lt;h4 class=&quot;font-bold mb-2&quot;&gt;特征提取&lt;/h4&gt;
                    &lt;p class=&quot;text-sm text-slate-600&quot;&gt;AI会把照片拆解成线条、颜色和形状。比如：它是圆的吗？它是红色的吗？&lt;/p&gt;
                &lt;/div&gt;
                &lt;div class=&quot;text-center&quot;&gt;
                    &lt;div class=&quot;text-4xl mb-4&quot;&gt;🧠&lt;/div&gt;
                    &lt;h4 class=&quot;font-bold mb-2&quot;&gt;模式识别&lt;/h4&gt;
                    &lt;p class=&quot;text-sm text-slate-600&quot;&gt;看了很多张后，AI发现这些照片都有共同点，这就是&ldquo;苹果&rdquo;的模式。&lt;/p&gt;
                &lt;/div&gt;
                &lt;div class=&quot;text-center&quot;&gt;
                    &lt;div class=&quot;text-4xl mb-4&quot;&gt;✅&lt;/div&gt;
                    &lt;h4 class=&quot;font-bold mb-2&quot;&gt;验证与反馈&lt;/h4&gt;
                    &lt;p class=&quot;text-sm text-slate-600&quot;&gt;当AI能准确识别出从未见过的苹果时，它就真正&ldquo;学会&rdquo;了！&lt;/p&gt;
                &lt;/div&gt;
            &lt;/div&gt;
        &lt;/section&gt;
    &lt;/main&gt;

    &lt;script&gt;
        const appleImages = [
            'https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/picture/E2eK2bFqUM6LXUwC8vtKJX.jpg', // 红苹果
            'https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/picture/GEvsK8suRtEw4xNhyXeiEn.jpg', // 青苹果
            'https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/picture/RfwLDM4psNG2JJUUjncEcF.jpg', // 切开的苹果
            'https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/picture/E2eK2bFqUM6LXUwC8vtKJX.jpg',
            'https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/picture/GEvsK8suRtEw4xNhyXeiEn.jpg',
            'https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/picture/RfwLDM4psNG2JJUUjncEcF.jpg',
            'https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/picture/E2eK2bFqUM6LXUwC8vtKJX.jpg',
            'https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/picture/GEvsK8suRtEw4xNhyXeiEn.jpg',
            'https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/picture/RfwLDM4psNG2JJUUjncEcF.jpg',
            'https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/picture/E2eK2bFqUM6LXUwC8vtKJX.jpg'
        ];

        const notes = [
            &quot;AI开始观察第一张照片，它注意到了红色和圆形的轮廓。&quot;,
            &quot;第二张是青色的，AI意识到苹果不一定是红色的。&quot;,
            &quot;第三张是切开的，AI学习到了苹果内部的结构特征。&quot;,
            &quot;观察了4张，AI开始尝试总结规律：圆形+果柄可能是关键。&quot;,
            &quot;第5张照片确认了之前的想法，AI的信心正在增加。&quot;,
            &quot;第6张，AI正在强化对&lsquo;苹果&rsquo;这个词的记忆。&quot;,
            &quot;第7张，AI已经能识别出大部分常见的苹果了。&quot;,
            &quot;第8张，即使光线不同，AI也能认出它。&quot;,
            &quot;第9张，AI几乎已经确定了苹果的所有核心特征。&quot;,
            &quot;第10张！AI完成了所有训练，它现在完全认识苹果了！&quot;
        ];

        let currentStep = 0;
        const maxSteps = 10;

        const learnBtn = document.getElementById('learn-btn');
        const resetBtn = document.getElementById('reset-btn');
        const progressBar = document.getElementById('progress');
        const statusText = document.getElementById('status-text');
        const noteText = document.getElementById('learning-note');
        const slots = document.querySelectorAll('.apple-slot');
        
        const elfConfused = document.getElementById('elf-confused');
        const elfThinking = document.getElementById('elf-thinking');
        const elfSuccess = document.getElementById('elf-success');

        function updateElfState(state) {
            elfConfused.classList.add('hidden-img');
            elfThinking.classList.add('hidden-img');
            elfSuccess.classList.add('hidden-img');

            if (state === 'confused') elfConfused.classList.remove('hidden-img');
            if (state === 'thinking') elfThinking.classList.remove('hidden-img');
            if (state === 'success') elfSuccess.classList.remove('hidden-img');
        }

        learnBtn.addEventListener('click', () =&gt; {
            if (currentStep &lt; maxSteps) {
                // 切换到思考状态
                updateElfState('thinking');
                learnBtn.disabled = true;

                // 模拟学习动画
                anime({
                    targets: '#elf-container',
                    scale: [1, 1.1, 1],
                    duration: 500,
                    easing: 'easeInOutQuad'
                });

                setTimeout(() =&gt; {
                    // 更新进度
                    currentStep++;
                    const progressPercent = (currentStep / maxSteps) * 100;
                    progressBar.style.width = progressPercent + '%';
                    
                    // 更新照片库
                    const slot = slots[currentStep - 1];
                    slot.innerHTML = `&lt;img src=&quot;${appleImages[currentStep-1]}&quot; class=&quot;w-full h-full object-cover rounded-lg shadow-sm&quot;&gt;`;
                    slot.classList.remove('border-dashed', 'text-slate-400');
                    slot.classList.add('border-blue-400');

                    // 更新文字
                    statusText.innerText = `当前状态：正在学习中 (${currentStep}/10) ⏳`;
                    noteText.innerText = notes[currentStep - 1];

                    if (currentStep === maxSteps) {
                        // 恍然大悟！
                        updateElfState('success');
                        statusText.innerText = &quot;当前状态：我认识苹果啦！💡&quot;;
                        statusText.classList.remove('text-blue-600');
                        statusText.classList.add('text-green-600', 'font-bold');
                        learnBtn.innerText = &quot;学习完成！✨&quot;;
                        learnBtn.classList.replace('bg-blue-600', 'bg-green-600');
                        
                        // 灯泡亮起动画
                        anime({
                            targets: '#elf-success',
                            translateY: [-10, 0],
                            opacity: [0.5, 1],
                            duration: 1000,
                            easing: 'easeOutElastic(1, .6)'
                        });
                    } else {
                        updateElfState('confused');
                        learnBtn.disabled = false;
                    }
                }, 600);
            }
        });

        resetBtn.addEventListener('click', () =&gt; {
            currentStep = 0;
            progressBar.style.width = '0%';
            statusText.innerText = &quot;当前状态：不认识苹果 ❓&quot;;
            statusText.classList.remove('text-green-600', 'font-bold');
            statusText.classList.add('text-blue-600');
            noteText.innerText = &quot;AI现在还不知道什么是苹果。它需要通过观察大量的特征（颜色、形状、果柄）来建立&ldquo;苹果&rdquo;的概念。&quot;;
            learnBtn.disabled = false;
            learnBtn.innerText = &quot;喂一张照片 🍎&quot;;
            learnBtn.classList.replace('bg-green-600', 'bg-blue-600');
            
            slots.forEach((slot, index) =&gt; {
                slot.innerHTML = index + 1;
                slot.classList.add('border-dashed', 'text-slate-400');
                slot.classList.remove('border-blue-400');
            });
            
            updateElfState('confused');
        });
    &lt;/script&gt;

  <script>

    function getIsMobile() {
      const width = document.documentElement.clientWidth
      const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|iPad|Windows Phone|Mobile/i.test(navigator.userAgent) || width <= 768
      return isMobile
    }

    // 打开飞象老师官网
    function openFeixiangTeacher(event) {
      const isMobile = getIsMobile()

      // 判断是否为移动端浏览器
      if (isMobile) {
        // 移动端不跳转
        return
      }
      window.open('https://www.feixianglaoshi.com', '_blank')
    }


    // ==================== 埋点相关代码 ====================

    /**
     * 页面停留时长统计
     */
    (function () {
      let startTime = null
      let totalTime = 0
      let reportTimer = null // 防抖定时器

      // 开始计时
      function startTimer() {
        if (!startTime) {
          startTime = Date.now()
          console.log('[埋点] 开始计时')
        }
      }

      // 停止计时并累加时长
      function stopTimer() {
        if (startTime) {
          totalTime += Date.now() - startTime
          startTime = null
          console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
        }
      }

      // 检查页面是否真正可见
      function isPageVisible() {
        // 检查 document.hidden
        if (document.hidden) {
          return false
        }

        // 检查 document.visibilityState
        if (document.visibilityState && document.visibilityState !== 'visible') {
          return false
        }

        // 检查窗口是否有焦点
        if (!document.hasFocus()) {
          return false
        }

        return true
      }

      // 上报停留时长（带防抖）
      function reportStayTime(eventType, immediate = false) {
        stopTimer()

        // 清除之前的定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 如果是立即上报（如页面卸载），不使用防抖
        if (immediate) {
          doReport(eventType)
          return
        }

        // 使用防抖，避免短时间内多次上报
        // 100ms 内如果有多个事件触发，只上报最后一次
        reportTimer = setTimeout(function () {
          doReport(eventType)
          reportTimer = null
        }, 100)
      }

      // 实际执行上报
      function doReport(eventType) {
        if (window.frog && totalTime > 0) {
          const serverData = window.__SERVER_DATA__ || {}
          const chatId = serverData.watermarkChatId
          window.frog.add({
            url: '/time/HtmlPage/enter',
            eventId: 42818,
            customExtend: {
              chat_id: chatId,
              use_time: Math.floor(totalTime / 1000), // 转换为秒
            },
            duration: Math.floor(totalTime / 1000), // 转换为秒,
            currentPage: 'HtmlPage',
            eventAction: 'time',
            eventName: 'enter'
          })
          console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

          // 上报后重置累计时长，为下次统计做准备
          totalTime = 0
        }
      }

      // 清理函数：移除所有事件监听器
      function cleanup() {
        console.log('[埋点] 清理计时器资源')

        // 清除防抖定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 移除事件监听器
        document.removeEventListener('visibilitychange', handleVisibilityChange)
        window.removeEventListener('blur', handleBlur)
        window.removeEventListener('focus', handleFocus)
        window.removeEventListener('beforeunload', handleBeforeUnload)
        window.removeEventListener('pagehide', handlePageHide)

        // 重置变量
        startTime = null
        totalTime = 0
      }

      // 事件处理函数（需要命名以便移除）
      function handleVisibilityChange() {
        if (document.hidden) {
          // 页面不可见，停止计时并上报
          console.log('[埋点] visibilitychange - 页面隐藏')
          reportStayTime('visibilitychange')
        } else {
          // 页面可见，开始新的计时
          console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
          startTimer()
        }
      }

      function handleBlur() {
        // 窗口失去焦点，停止计时并上报
        console.log('[埋点] blur - 窗口失去焦点')
        reportStayTime('blur')
      }

      function handleFocus() {
        // 窗口获得焦点，开始新的计时
        console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
        startTimer()
      }

      function handleBeforeUnload() {
        // 页面卸载前立即上报（不使用防抖）
        console.log('[埋点] beforeunload - 页面即将卸载')
        reportStayTime('beforeunload', true)
        cleanup()
      }

      function handlePageHide() {
        // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
        console.log('[埋点] pagehide - 页面隐藏')
        reportStayTime('pagehide', true)
      }

      function handleDOMContentLoaded() {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 监听页面可见性变化
      document.addEventListener('visibilitychange', handleVisibilityChange)

      // 监听窗口失去/获得焦点
      window.addEventListener('blur', handleBlur)
      window.addEventListener('focus', handleFocus)

      // 页面加载完成后开始计时
      if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
      } else {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 页面卸载时上报
      window.addEventListener('beforeunload', handleBeforeUnload)

      // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
      window.addEventListener('pagehide', handlePageHide)
    })()

    /**
     * 点击飞象老师 Logo 的埋点
     */
    function trackLogoClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)

        window.frog.add({
          url: '/click/HtmlPage/logo',
          eventId: 42816,
          customExtend: {
            chat_id: chatId,
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'logo'
        })

        console.log('[埋点] 点击飞象老师 Logo')
      }
    }

    /**
     * 点击立即体验的埋点
     */
    function trackStartButtonClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)
        window.frog.add({
          url: '/click/HtmlPage/start',
          eventId: 42817,
          customExtend: {
            chat_id: chatId
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'start'
        })
        console.log('[埋点] 点击立即体验')
      }
    }

    // 绑定点击事件
    document.addEventListener('DOMContentLoaded', function () {
      // 绑定 Logo 点击埋点和跳转功能
      const logoElement = document.querySelector('.left-watermark-content')
      if (logoElement) {
        logoElement.addEventListener('click', function (event) {
          trackLogoClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定立即体验按钮点击埋点和跳转功能
      const startButton = document.querySelector('.jump-button')
      if (startButton) {
        startButton.addEventListener('click', function (event) {
          trackStartButtonClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定水印覆盖层点击（整体区域）
      const watermarkOverlay = document.querySelector('.watermark-overlay')
      if (watermarkOverlay) {
        watermarkOverlay.addEventListener('click', function (event) {
          // 如果点击的不是 logo 或按钮，则触发跳转
          const target = event.target
          const isLogo = target.closest('.left-watermark-content')
          const isButton = target.closest('.jump-button')

          if (!isLogo && !isButton) {
            openFeixiangTeacher(event)
          }
        })
      }
    })

    // ==================== 原有功能代码 ====================

    function adjustRem() {
      const pcBaseWidth = 375 // 设计稿
      const width = document.documentElement.clientWidth
      document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
      const isMobile = getIsMobile()
      if (isMobile) {
        adjustRem()
      }
      const jumpButton = document.querySelector('.right-watermark-content .jump-button');
      const iframeContainer = document.querySelector('.iframe-container');

      if (isMobile && jumpButton) {
        jumpButton.style.display = 'none';
      } else {
        jumpButton.style.display = 'flex'
      }

      // 移动端时给iframe-container添加类名，否则移除类名
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }


    function handleResize() {
      // 响应式处理：重新检测移动端并处理按钮显示/隐藏
      checkAndHideButtonOnMobile();

      // 在窗口大小变化时，重新应用移动端相关的逻辑
      const isMobile = getIsMobile()
      const watermarkOverlay = document.querySelector('.watermark-overlay');
      const iframeContainer = document.querySelector('.iframe-container');

      // 根据当前设备类型调整水印覆盖层的点击行为
      if (watermarkOverlay) {
        if (isMobile) {
          // 移动端：移除点击事件或设置为空函数
          watermarkOverlay.onclick = function () {
            // 移动端不执行跳转
            return;
          };
        } else {
          // 桌面端：恢复正常的点击跳转功能
          watermarkOverlay.onclick = openFeixiangTeacher;
        }
      }

      // 确保在resize时也能正确添加或移除mobile类
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
      // 清除 resize 事件监听器
      window.removeEventListener('resize', handleResize);

      // 清除 DOMContentLoaded 事件监听器
      document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);

  </script>
