    &lt;div id=&quot;app&quot;&gt;
        &lt;div class=&quot;scene-container&quot; id=&quot;scene&quot;&gt;
            &lt;div class=&quot;dark-overlay&quot; id=&quot;overlay&quot;&gt;&lt;/div&gt;
            
            &lt;!-- 小主人 --&gt;
            &lt;img src=&quot;https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/picture/rwQMS55hZUswnTE5ZF8voJ.jpg&quot; id=&quot;boy-sprite&quot; class=&quot;sprite&quot; alt=&quot;小主人&quot;&gt;
            
            &lt;!-- AI 精靈 --&gt;
            &lt;img src=&quot;https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/picture/S4q8Fau5aiGViamZfuscAj.jpg&quot; id=&quot;ai-sprite&quot; class=&quot;sprite&quot; alt=&quot;AI精靈&quot;&gt;
            
            &lt;!-- 襪子 --&gt;
            &lt;img src=&quot;https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/picture/FdusMspTGjq3diHJ5cfe2V.jpg&quot; id=&quot;socks-sprite&quot; class=&quot;sprite&quot; alt=&quot;襪子&quot;&gt;
            
            &lt;!-- 掃描光束 --&gt;
            &lt;div id=&quot;scan-beam&quot; class=&quot;scan-beam&quot;&gt;&lt;/div&gt;
            
            &lt;div class=&quot;dialogue-box&quot; id=&quot;dialogue&quot;&gt;點擊下方按鈕，看看 AI 小精靈的魔法吧！&lt;/div&gt;
        &lt;/div&gt;

        &lt;div class=&quot;controls&quot;&gt;
            &lt;button class=&quot;btn&quot; onclick=&quot;playSceneA()&quot;&gt;場景 A：開燈&lt;/button&gt;
            &lt;button class=&quot;btn&quot; onclick=&quot;playSceneB()&quot;&gt;場景 B：聽歌&lt;/button&gt;
            &lt;button class=&quot;btn&quot; onclick=&quot;playSceneC()&quot;&gt;場景 C：找襪子&lt;/button&gt;
            &lt;button class=&quot;btn&quot; style=&quot;background: #10b981;&quot; onclick=&quot;playIntro()&quot;&gt;語音導讀&lt;/button&gt;
        &lt;/div&gt;
    &lt;/div&gt;

    &lt;audio id=&quot;intro-audio&quot; src=&quot;https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/2A4bkxfKuipMimm8uFfTKm.mp3&quot;&gt;&lt;/audio&gt;
    &lt;audio id=&quot;bg-music&quot; src=&quot;https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3&quot;&gt;&lt;/audio&gt;

    &lt;script&gt;
        const ai = document.getElementById('ai-sprite');
        const boy = document.getElementById('boy-sprite');
        const socks = document.getElementById('socks-sprite');
        const overlay = document.getElementById('overlay');
        const dialogue = document.getElementById('dialogue');
        const beam = document.getElementById('scan-beam');
        const introAudio = document.getElementById('intro-audio');
        const bgMusic = document.getElementById('bg-music');

        // 初始化 AI 精靈位置與浮動動畫
        anime({
            targets: ai,
            translateX: 500,
            translateY: 150,
            duration: 0
        });

        anime({
            targets: ai,
            translateY: '+=20',
            direction: 'alternate',
            loop: true,
            easing: 'easeInOutQuad',
            duration: 1500
        });

        function updateDialogue(text) {
            dialogue.innerText = text;
            anime({
                targets: dialogue,
                scale: [0.9, 1],
                opacity: [0, 1],
                duration: 500
            });
        }

        // 場景 A：開燈
        function playSceneA() {
            resetAll();
            updateDialogue('小主人：「好黑啊...」');
            overlay.style.opacity = 1;
            
            setTimeout(() =&gt; {
                updateDialogue('AI 精靈揮動翅膀，「啪」！');
                anime({
                    targets: ai,
                    rotate: [0, -20, 20, 0],
                    duration: 500,
                    complete: () =&gt; {
                        overlay.style.opacity = 0;
                        updateDialogue('燈亮啦！房間變暖和了。');
                    }
                });
            }, 1500);
        }

        // 場景 B：聽歌
        function playSceneB() {
            resetAll();
            updateDialogue('小主人：「我想聽歌！」');
            
            setTimeout(() =&gt; {
                updateDialogue('AI 精靈張開嘴，響起歡快的音樂～');
                bgMusic.play();
                setTimeout(() =&gt; {
                    bgMusic.pause();
                    bgMusic.currentTime = 0;
                }, 3000);
                for(let i=0; i&lt;5; i++) {
                    createNote();
                }
            }, 1000);
        }

        function createNote() {
            const note = document.createElement('div');
            note.className = 'music-note';
            note.innerHTML = '♪';
            note.style.left = (parseInt(ai.style.left || 500) + 50) + 'px';
            note.style.top = (parseInt(ai.style.top || 150) + 50) + 'px';
            document.getElementById('scene').appendChild(note);

            anime({
                targets: note,
                translateX: () =&gt; anime.random(-100, 100),
                translateY: () =&gt; anime.random(-150, -50),
                opacity: [0, 1, 0],
                fontSize: [10, 30],
                duration: 2000,
                easing: 'easeOutExpo',
                complete: () =&gt; note.remove()
            });
        }

        // 場景 C：找襪子
        function playSceneC() {
            resetAll();
            updateDialogue('小主人：「我的襪子在哪裡？」');
            
            setTimeout(() =&gt; {
                updateDialogue('AI 精靈開啟掃描模式！');
                const aiRect = ai.getBoundingClientRect();
                const sceneRect = document.getElementById('scene').getBoundingClientRect();
                
                beam.style.left = (aiRect.left - sceneRect.left + 60) + 'px';
                beam.style.top = (aiRect.top - sceneRect.top + 60) + 'px';
                beam.style.opacity = 1;

                anime({
                    targets: beam,
                    height: [0, 300],
                    rotate: [0, 45, -45, 30],
                    duration: 2000,
                    easing: 'easeInOutQuad',
                    complete: () =&gt; {
                        beam.style.opacity = 0;
                        socks.style.opacity = 1;
                        anime({
                            targets: socks,
                            scale: [0, 1.2, 1],
                            duration: 800
                        });
                        updateDialogue('找到了！襪子就在床底喔！');
                    }
                });
            }, 1500);
        }

        function playIntro() {
            introAudio.play();
            updateDialogue('我是 AI 小助手，我有魔法，最愛幫你的忙！');
        }

        function resetAll() {
            overlay.style.opacity = 0;
            socks.style.opacity = 0;
            beam.style.opacity = 0;
            introAudio.pause();
            introAudio.currentTime = 0;
            bgMusic.pause();
            bgMusic.currentTime = 0;
        }
    &lt;/script&gt;

  <script>

    function getIsMobile() {
      const width = document.documentElement.clientWidth
      const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|iPad|Windows Phone|Mobile/i.test(navigator.userAgent) || width <= 768
      return isMobile
    }

    // 打开飞象老师官网
    function openFeixiangTeacher(event) {
      const isMobile = getIsMobile()

      // 判断是否为移动端浏览器
      if (isMobile) {
        // 移动端不跳转
        return
      }
      window.open('https://www.feixianglaoshi.com', '_blank')
    }


    // ==================== 埋点相关代码 ====================

    /**
     * 页面停留时长统计
     */
    (function () {
      let startTime = null
      let totalTime = 0
      let reportTimer = null // 防抖定时器

      // 开始计时
      function startTimer() {
        if (!startTime) {
          startTime = Date.now()
          console.log('[埋点] 开始计时')
        }
      }

      // 停止计时并累加时长
      function stopTimer() {
        if (startTime) {
          totalTime += Date.now() - startTime
          startTime = null
          console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
        }
      }

      // 检查页面是否真正可见
      function isPageVisible() {
        // 检查 document.hidden
        if (document.hidden) {
          return false
        }

        // 检查 document.visibilityState
        if (document.visibilityState && document.visibilityState !== 'visible') {
          return false
        }

        // 检查窗口是否有焦点
        if (!document.hasFocus()) {
          return false
        }

        return true
      }

      // 上报停留时长（带防抖）
      function reportStayTime(eventType, immediate = false) {
        stopTimer()

        // 清除之前的定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 如果是立即上报（如页面卸载），不使用防抖
        if (immediate) {
          doReport(eventType)
          return
        }

        // 使用防抖，避免短时间内多次上报
        // 100ms 内如果有多个事件触发，只上报最后一次
        reportTimer = setTimeout(function () {
          doReport(eventType)
          reportTimer = null
        }, 100)
      }

      // 实际执行上报
      function doReport(eventType) {
        if (window.frog && totalTime > 0) {
          const serverData = window.__SERVER_DATA__ || {}
          const chatId = serverData.watermarkChatId
          window.frog.add({
            url: '/time/HtmlPage/enter',
            eventId: 42818,
            customExtend: {
              chat_id: chatId,
              use_time: Math.floor(totalTime / 1000), // 转换为秒
            },
            duration: Math.floor(totalTime / 1000), // 转换为秒,
            currentPage: 'HtmlPage',
            eventAction: 'time',
            eventName: 'enter'
          })
          console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

          // 上报后重置累计时长，为下次统计做准备
          totalTime = 0
        }
      }

      // 清理函数：移除所有事件监听器
      function cleanup() {
        console.log('[埋点] 清理计时器资源')

        // 清除防抖定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 移除事件监听器
        document.removeEventListener('visibilitychange', handleVisibilityChange)
        window.removeEventListener('blur', handleBlur)
        window.removeEventListener('focus', handleFocus)
        window.removeEventListener('beforeunload', handleBeforeUnload)
        window.removeEventListener('pagehide', handlePageHide)

        // 重置变量
        startTime = null
        totalTime = 0
      }

      // 事件处理函数（需要命名以便移除）
      function handleVisibilityChange() {
        if (document.hidden) {
          // 页面不可见，停止计时并上报
          console.log('[埋点] visibilitychange - 页面隐藏')
          reportStayTime('visibilitychange')
        } else {
          // 页面可见，开始新的计时
          console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
          startTimer()
        }
      }

      function handleBlur() {
        // 窗口失去焦点，停止计时并上报
        console.log('[埋点] blur - 窗口失去焦点')
        reportStayTime('blur')
      }

      function handleFocus() {
        // 窗口获得焦点，开始新的计时
        console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
        startTimer()
      }

      function handleBeforeUnload() {
        // 页面卸载前立即上报（不使用防抖）
        console.log('[埋点] beforeunload - 页面即将卸载')
        reportStayTime('beforeunload', true)
        cleanup()
      }

      function handlePageHide() {
        // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
        console.log('[埋点] pagehide - 页面隐藏')
        reportStayTime('pagehide', true)
      }

      function handleDOMContentLoaded() {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 监听页面可见性变化
      document.addEventListener('visibilitychange', handleVisibilityChange)

      // 监听窗口失去/获得焦点
      window.addEventListener('blur', handleBlur)
      window.addEventListener('focus', handleFocus)

      // 页面加载完成后开始计时
      if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
      } else {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 页面卸载时上报
      window.addEventListener('beforeunload', handleBeforeUnload)

      // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
      window.addEventListener('pagehide', handlePageHide)
    })()

    //      * 点击 HTML 任何部分的埋点
    //      */
    //     function trackHtmlClick(event) {

    /**
     * 点击飞象老师 Logo 的埋点

      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}

        console.log('trackHtmlClick', chatId)

        window.frog.add({
          url: '/click/HtmlPage/logo',
          eventId: 42816,
          customExtend: {
            chat_id: chatId,
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'logo'
        })

        console.log('[埋点] 点击飞象老师 Logo')
      }
    }

    /**
     * 点击立即体验的埋点
     */
    function trackStartButtonClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)
        window.frog.add({
          url: '/click/HtmlPage/start',
          eventId: 42817,
          customExtend: {
            chat_id: chatId
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'start'
        })
        console.log('[埋点] 点击立即体验')
      }
    }

    // 绑定点击事件
    document.addEventListener('DOMContentLoaded', function () {
      // 绑定 Logo 点击埋点和跳转功能
      const logoElement = document.querySelector('.left-watermark-content')
      if (logoElement) {
        logoElement.addEventListener('click', function (event) {
          trackLogoClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定立即体验按钮点击埋点和跳转功能
      const startButton = document.querySelector('.jump-button')
      if (startButton) {
        startButton.addEventListener('click', function (event) {
          trackStartButtonClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定水印覆盖层点击（整体区域）
      const watermarkOverlay = document.querySelector('.watermark-overlay')
      if (watermarkOverlay) {
        watermarkOverlay.addEventListener('click', function (event) {
          // 如果点击的不是 logo 或按钮，则触发跳转
          const target = event.target
          const isLogo = target.closest('.left-watermark-content')
          const isButton = target.closest('.jump-button')

          if (!isLogo && !isButton) {
            openFeixiangTeacher(event)
          }
        })
      }
    })

    // ==================== 原有功能代码 ====================

    function adjustRem() {
      const pcBaseWidth = 375 // 设计稿
      const width = document.documentElement.clientWidth
      document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
      const isMobile = getIsMobile()
      if (isMobile) {
        adjustRem()
      }
      const jumpButton = document.querySelector('.right-watermark-content .jump-button');
      const iframeContainer = document.querySelector('.iframe-container');

      if (isMobile && jumpButton) {
        jumpButton.style.display = 'none';
      } else {
        jumpButton.style.display = 'flex'
      }

      // 移动端时给iframe-container添加类名，否则移除类名
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }


    function handleResize() {
      // 响应式处理：重新检测移动端并处理按钮显示/隐藏
      checkAndHideButtonOnMobile();

      // 在窗口大小变化时，重新应用移动端相关的逻辑
      const isMobile = getIsMobile()
      const watermarkOverlay = document.querySelector('.watermark-overlay');
      const iframeContainer = document.querySelector('.iframe-container');

      // 根据当前设备类型调整水印覆盖层的点击行为
      if (watermarkOverlay) {
        if (isMobile) {
          // 移动端：移除点击事件或设置为空函数
          watermarkOverlay.onclick = function () {
            // 移动端不执行跳转
            return;
          };
        } else {
          // 桌面端：恢复正常的点击跳转功能
          watermarkOverlay.onclick = openFeixiangTeacher;
        }
      }

      // 确保在resize时也能正确添加或移除mobile类
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
      // 清除 resize 事件监听器
      window.removeEventListener('resize', handleResize);

      // 清除 DOMContentLoaded 事件监听器
      document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);

  </script>
